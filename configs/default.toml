[benchmark]
warmup_runs = 3
measured_runs = 10
max_tokens = 256
temperature = 0.0
randomize_order = true
prompt_suite = "prompts/suite.toml"
output_dir = "results"

# Models can be HuggingFace repo IDs (downloaded on first run) or local paths.
# Organize by family to compare quantization levels of the same base model.
# The "reference" variant is the quality baseline for output similarity comparison.

# --- Tiny (< 1B) ---
[[model_family]]
name = "Qwen2.5 0.5B Instruct"
kind = "text"
size = "0.5B"
variants = [
    { repo = "mlx-community/Qwen2.5-0.5B-Instruct-bf16", quant = "bf16" },
    { repo = "mlx-community/Qwen2.5-0.5B-Instruct-8bit", quant = "8bit" },
    { repo = "mlx-community/Qwen2.5-0.5B-Instruct-4bit", quant = "4bit" },
]
reference = "bf16"

# --- Small (1-3B) ---
[[model_family]]
name = "Llama 3.2 1B Instruct"
kind = "text"
size = "1B"
variants = [
    { repo = "mlx-community/Llama-3.2-1B-Instruct-bf16", quant = "bf16" },
    { repo = "mlx-community/Llama-3.2-1B-Instruct-8bit", quant = "8bit" },
    { repo = "mlx-community/Llama-3.2-1B-Instruct-4bit", quant = "4bit" },
]
reference = "bf16"

[[model_family]]
name = "Llama 3.2 3B Instruct"
kind = "text"
size = "3B"
variants = [
    { repo = "mlx-community/Llama-3.2-3B-Instruct-bf16", quant = "bf16" },
    { repo = "mlx-community/Llama-3.2-3B-Instruct-8bit", quant = "8bit" },
    { repo = "mlx-community/Llama-3.2-3B-Instruct-4bit", quant = "4bit" },
]
reference = "bf16"

# --- Medium (7-8B) ---
[[model_family]]
name = "Mistral 7B Instruct v0.3"
kind = "text"
size = "7B"
variants = [
    { repo = "mlx-community/Mistral-7B-Instruct-v0.3", quant = "fp16" },
    { repo = "mlx-community/Mistral-7B-Instruct-v0.3-8bit", quant = "8bit" },
    { repo = "mlx-community/Mistral-7B-Instruct-v0.3-4bit", quant = "4bit" },
]
reference = "fp16"

[[model_family]]
name = "Llama 3.1 8B Instruct"
kind = "text"
size = "8B"
variants = [
    { repo = "mlx-community/Llama-3.1-8B-Instruct-bf16", quant = "bf16" },
    { repo = "mlx-community/Llama-3.1-8B-Instruct-8bit", quant = "8bit" },
    { repo = "mlx-community/Llama-3.1-8B-Instruct-4bit", quant = "4bit" },
]
reference = "bf16"

# --- Large (14B+) ---
[[model_family]]
name = "Qwen2.5 14B Instruct"
kind = "text"
size = "14B"
variants = [
    { repo = "mlx-community/Qwen2.5-14B-Instruct-bf16", quant = "bf16" },
    { repo = "mlx-community/Qwen2.5-14B-Instruct-8bit", quant = "8bit" },
    { repo = "mlx-community/Qwen2.5-14B-Instruct-4bit", quant = "4bit" },
]
reference = "bf16"

# --- XL (70B+) — only 4bit fits on most machines ---
[[model_family]]
name = "Llama 3.1 70B Instruct"
kind = "text"
size = "70B"
variants = [
    { repo = "mlx-community/Llama-3.1-70B-Instruct-4bit", quant = "4bit" },
