reference = "4bit"

# --- Vision ---
[[model_family]]
name = "Qwen2.5 VL 7B Instruct"
kind = "vision"
size = "7B"
variants = [
    { repo = "mlx-community/Qwen2.5-VL-7B-Instruct-8bit", quant = "8bit" },
    { repo = "mlx-community/Qwen2.5-VL-7B-Instruct-4bit", quant = "4bit" },
