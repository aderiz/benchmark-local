# Quick benchmark — two small models, fast to download and run.
# Good for verifying your setup works before running the full suite.
#
# Usage: uv run bench --config configs/quick.toml --no-tui
#
# Downloads ~2GB of models on first run (cached for future runs).
# Takes approximately 5-10 minutes on an M1/M2/M3/M4 Mac.

[benchmark]
warmup_runs = 2
measured_runs = 5
max_tokens = 512
temperature = 0.0
randomize_order = true
prompt_suite = "prompts/suite.toml"
output_dir = "results"

[[model_family]]
name = "Qwen2.5 0.5B Instruct"
kind = "text"
size = "0.5B"
variants = [
    { repo = "mlx-community/Qwen2.5-0.5B-Instruct-8bit", quant = "8bit" },
    { repo = "mlx-community/Qwen2.5-0.5B-Instruct-4bit", quant = "4bit" },
]
reference = "8bit"

[[model_family]]
name = "Llama 3.2 3B Instruct"
kind = "text"
size = "3B"
variants = [
    { repo = "mlx-community/Llama-3.2-3B-Instruct-8bit", quant = "8bit" },
    { repo = "mlx-community/Llama-3.2-3B-Instruct-4bit", quant = "4bit" },
]
reference = "8bit"
