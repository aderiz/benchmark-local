# Example config using local model paths.
#
# If you have models downloaded to a local directory, point "repo" at the
# absolute path instead of a HuggingFace repo ID. This skips the download
# step entirely.
#
# Copy this file, adjust the paths, and run:
#   uv run bench --config configs/my_local.toml

[benchmark]
warmup_runs = 3
measured_runs = 10
max_tokens = 256
temperature = 0.0
randomize_order = true
prompt_suite = "prompts/suite.toml"
output_dir = "results"

# --- Example: local Qwen3.5 models at /Volumes/MODELS/AI/MLX ---

[[model_family]]
name = "Qwen3.5 0.8B"
kind = "text"
size = "0.8B"
variants = [
    { repo = "/Volumes/MODELS/AI/MLX/Qwen3.5/Base/mlx-community/Qwen3.5-0.8B-MLX-8bit", quant = "8bit" },
    { repo = "/Volumes/MODELS/AI/MLX/Qwen3.5/Base/mlx-community/Qwen3.5-0.8B-MLX-4bit", quant = "4bit" },
]
reference = "8bit"

[[model_family]]
name = "Qwen3.5 4B"
kind = "text"
size = "4B"
variants = [
    { repo = "/Volumes/MODELS/AI/MLX/Qwen3.5/Base/mlx-community/Qwen3.5-4B-8bit", quant = "8bit" },
    { repo = "/Volumes/MODELS/AI/MLX/Qwen3.5/Base/mlx-community/Qwen3.5-4B-4bit", quant = "4bit" },
]
reference = "8bit"

[[model_family]]
name = "Qwen3.5 9B"
kind = "text"
size = "9B"
variants = [
    { repo = "/Volumes/MODELS/AI/MLX/Qwen3.5/Base/mlx-community/Qwen3.5-9B-MLX-8bit", quant = "8bit" },
    { repo = "/Volumes/MODELS/AI/MLX/Qwen3.5/Base/mlx-community/Qwen3.5-9B-MLX-4bit", quant = "4bit" },
]
reference = "8bit"
